# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - cryptowatchpro

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build Next.js app (standalone output)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://cryptowatchpro.azurewebsites.net
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SENTRY_SUPPRESS_GLOBAL_ERROR_HANDLER_FILE_WARNING: 1

      # next build --standalone produces .next/standalone — a self-contained
      # server that needs NO separate node_modules copy. We add the static
      # assets and public folder, then zip only that folder (~80 MB vs 500 MB).
      - name: Prepare standalone deployment package
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Zip standalone folder for deployment
        run: |
          cd .next/standalone
          zip -r ../../release.zip . -x "*.map"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # Tell Azure NOT to re-run Oryx build on our pre-built package.
      # SCM_DO_BUILD_DURING_DEPLOYMENT=false + startup command set here.
      - name: Configure Azure App Service settings
        uses: azure/appservice-settings@v1
        with:
          app-name: 'cryptowatchpro'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_CRYPTOWATCHPRO }}
          app-settings-json: |
            [
              { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "false", "slotSetting": false },
              { "name": "WEBSITE_RUN_FROM_PACKAGE",        "value": "0",     "slotSetting": false },
              { "name": "NEXT_PUBLIC_SUPABASE_URL",         "value": "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}",   "slotSetting": false },
              { "name": "NEXT_PUBLIC_SUPABASE_ANON_KEY",    "value": "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}", "slotSetting": false },
              { "name": "NEXT_PUBLIC_APP_URL",              "value": "https://cryptowatchpro.azurewebsites.net", "slotSetting": false },
              { "name": "SUPABASE_SERVICE_ROLE_KEY",        "value": "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}", "slotSetting": false },
              { "name": "ANTHROPIC_API_KEY",                "value": "${{ secrets.ANTHROPIC_API_KEY }}",         "slotSetting": false },
              { "name": "ANTHROPIC_MODEL",                  "value": "claude-3-5-sonnet-latest",                 "slotSetting": false },
              { "name": "RESEND_API_KEY",                   "value": "${{ secrets.RESEND_API_KEY }}",            "slotSetting": false },
              { "name": "ALERT_FROM_EMAIL",                 "value": "${{ secrets.ALERT_FROM_EMAIL }}",          "slotSetting": false },
              { "name": "CRON_SECRET",                      "value": "${{ secrets.CRON_SECRET }}",               "slotSetting": false }
            ]
          general-settings-json: |
            {
              "appCommandLine": "node server.js"
            }

      # Deploy the zip directly — azure/webapps-deploy handles zip files natively.
      # Do NOT unzip first: that would deploy release.zip + extracted contents (2x size).
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cryptowatchpro'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_CRYPTOWATCHPRO }}
          package: release.zip